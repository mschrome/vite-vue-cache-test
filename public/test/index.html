<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL 参数测试</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; }
    .box { background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 8px; padding: 16px 20px; }
    .box code { background: #e0f2fe; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
    .empty { color: #888; }
    table { border-collapse: collapse; margin-top: 12px; width: 100%; }
    td, th { border: 1px solid #ddd; padding: 6px 12px; text-align: left; }
    th { background: #f5f5f5; }
  </style>
</head>
<body>
  <h2>🔍 URL 参数测试 index</h2>
  <div class="box" id="result"></div>
  <script>
    const params = new URLSearchParams(location.search);
    const entries = [...params.entries()];
    const el = document.getElementById('result');
    if (entries.length === 0) {
      el.innerHTML = '<p class="empty">当前 URL 没有参数。试试访问：<code>?t=hello&name=world</code></p>';
    } else {
      let html = '<table><tr><th>参数名</th><th>值</th></tr>';
      entries.forEach(([k, v]) => html += `<tr><td>${k}</td><td><code>${v}</code></td></tr>`);
      html += '</table>';
      el.innerHTML = html;
    }
  </script>
</body>
</html>
